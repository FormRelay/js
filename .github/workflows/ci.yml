name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp install

      - run: vp run -r build
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules

      - name: Test core
        run: cd packages/core && vp test

      - name: Test vue
        run: cd packages/vue && vp test

      - name: Lint
        run: vp lint

      - name: Format check
        run: vp fmt --check
