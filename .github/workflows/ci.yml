name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Test core
        run: cd packages/core && pnpm exec vp test

      - name: Test vue
        run: cd packages/vue && pnpm exec vp test

      - name: Lint
        run: pnpm exec vp lint

      - name: Format check
        run: pnpm exec vp fmt --check
